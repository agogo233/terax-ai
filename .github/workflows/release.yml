name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Generate Cargo.lock
        working-directory: ./src-tauri
        run: cargo generate-lockfile

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: windows-latest-x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Cargo.lock before build
        working-directory: ./src-tauri
        run: cargo update --workspace

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: Terax-${{ github.sha }}
          releaseName: "Terax ${{ github.sha }}"
          releaseBody: "Portable ZIP package for Windows x64."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          tauriScript: pnpm tauri

      - name: Extract exe from NSIS bundle
        run: |
          $exePath = Get-ChildItem -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if ($exePath) {
            Write-Host "Found: $($exePath.FullName)"
            Copy-Item $exePath.FullName -Destination "Terax-portable-x64.exe"
          } else {
            Write-Error "No .exe found in NSIS bundle directory"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Terax-portable-x64
          path: Terax-portable-x64.exe
          retention-days: 30

      - name: Upload portable EXE to release
        run: |
          gh release upload "Terax-${{ github.sha }}" "Terax-portable-x64.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated Cargo.lock
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src-tauri/Cargo.lock
          git commit -m "chore: update Cargo.lock" || echo "No changes to commit"
          git push
